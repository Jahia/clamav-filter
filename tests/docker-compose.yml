services:
    jahia:
        image: '${JAHIA_IMAGE}'
        container_name: jahia
        ports:
            - '8080:8080'
            - '8000:8000'
        environment:
            - SUPER_USER_PASSWORD=${SUPER_USER_PASSWORD}
            - JAHIA_LICENSE=${JAHIA_LICENSE}
            - JPDA=true
        extra_hosts:
            - jahia:127.0.0.1
        networks:
            - stack
    clamav:
        image: 'clamav/clamav:stable'
        container_name: clamav
        ports:
            - '3310:3310'
        networks:
            - stack
    cypress:
        image: '${TESTS_IMAGE}'
        ipc: host
        container_name: cypress
        depends_on:
            - jahia
            - clamav
        environment:
            - MANIFEST=${MANIFEST}
            - SUPER_USER_PASSWORD=${SUPER_USER_PASSWORD}
            - JAHIA_URL=http://jahia:8080
            - NEXUS_USERNAME=${NEXUS_USERNAME}
            - NEXUS_PASSWORD=${NEXUS_PASSWORD}
        networks:
            - stack
networks:
    stack:
